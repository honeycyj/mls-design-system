name: Check design tokens

on:
  pull_request:
    paths:
      - "tokens/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/check-tokens.yml"
  push:
    branches:
      - main

jobs:
  check-tokens:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run build:tokens
      - run: git diff --exit-code

